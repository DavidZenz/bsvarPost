name: R-CMD-check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}
          - {os: ubuntu-latest,  r: 'devel',    http-user-agent: 'release'}
          - {os: ubuntu-latest,  r: 'release'}
          - {os: ubuntu-latest,  r: 'oldrel-1'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      _R_CHECK_FORCE_SUGGESTS_: false

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          args: 'c("--as-cran", "--no-manual")'
          build_args: 'character()'
          upload-snapshots: true

      - name: Show check logs on failure
        if: failure()
        shell: bash
        run: |
          echo "Contents of check/:"
          find check -maxdepth 4 -type f | sort || true
          for f in $(find check -type f \( -name '00check.log' -o -name '00install.out' \) 2>/dev/null); do
            echo "::group::${f}"
            sed -n '1,240p' "$f" || true
            echo "::endgroup::"
          done

      - name: Upload check directory
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: r-cmd-check-dir-${{ matrix.config.os }}-${{ matrix.config.r }}
          path: check
          if-no-files-found: warn

      - name: Upload check logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: r-cmd-check-logs-${{ matrix.config.os }}-${{ matrix.config.r }}
          path: |
            check/**/00check.log
            check/**/00install.out
            *.Rcheck/00check.log
            *.Rcheck/00install.out
          if-no-files-found: warn
