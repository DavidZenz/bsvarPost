name: R-CMD-check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  R-CMD-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          args: 'c("--as-cran", "--no-manual")'
          build_args: 'character()'
        env:
          _R_CHECK_FORCE_SUGGESTS_: false

      - name: Show check logs on failure
        if: failure()
        shell: bash
        run: |
          echo "Contents of check/:"
          find check -maxdepth 4 -type f | sort || true
          for f in $(find check -type f \( -name '00check.log' -o -name '00install.out' \) 2>/dev/null); do
            echo "::group::${f}"
            sed -n '1,240p' "$f" || true
            echo "::endgroup::"
          done

      - name: Upload check directory
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: r-cmd-check-dir-${{ runner.os }}
          path: check
          if-no-files-found: warn

      - name: Upload check logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: r-cmd-check-logs-${{ runner.os }}
          path: |
            check/**/00check.log
            check/**/00install.out
            *.Rcheck/00check.log
            *.Rcheck/00install.out
          if-no-files-found: warn
